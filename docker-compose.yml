version: '3.8'

services:
  frontend:
    build:
      context: ./frontend
    ports:
      - "5173:5173"
    environment:
      - NODE_ENV=development
    volumes:
      - ./frontend:/app
      - /app/node_modules

  auth-service:
    build:
      context: ./services/auth
    ports:
      - "8000:8000"
    environment:
      - NODE_ENV=development
      - PORT=8000
    env_file:
      - ./services/auth/.env
    volumes:
      - ./services/auth:/app
      - /app/node_modules

  ai-service:
    build:
      context: ./services/ai
    ports:
      - "8001:8001"
    environment:
      - NODE_ENV=development
      - PORT=8001
    env_file:
      - ./services/ai/.env
    volumes:
      - ./services/ai:/app
      - /app/node_modules
