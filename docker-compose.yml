
services:

  frontend:
    build:
      context: ./frontend
      args:
        # VITE_ vars must be passed at BUILD TIME so Vite can embed them in the bundle
        VITE_GOOGLE_CLIENT_ID: ${VITE_GOOGLE_CLIENT_ID}
        VITE_AUTH_BASE_URL: ${VITE_AUTH_BASE_URL}
        VITE_AI_BASE_URL: ${VITE_AI_BASE_URL}
    container_name: ResumeIQ_frontend
    ports:
      - "5173:80"          # nginx inside the container listens on 80
    env_file:
      - ./.env
    depends_on:
      - auth-service
      - ai-service
    networks:
      - app-network
    restart: unless-stopped

  auth-service:
    build:
      context: ./services/auth
    ports:
      - "3001:3001"
    env_file:
      - ./.env
    environment:
      NODE_ENV: production
      PORT: 3001
    networks:
      - app-network
    restart: unless-stopped

  ai-service:
    build:
      context: ./services/ai
    ports:
      - "3002:3002"
    env_file:
      - ./.env
    environment:
      NODE_ENV: production
      PORT: 3002
    networks:
      - app-network
    restart: unless-stopped

networks:
  app-network:
    driver: bridge