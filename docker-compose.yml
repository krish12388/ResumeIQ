version: '3.8'

services:
  frontend:
    build:
      context: ./frontend
    ports:
      - "5173:5173"
    env_file:
      - ./frontend/.env
    environment:
      NODE_ENV: development
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - auth-service
      - ai-service
    networks:
      - app-network
    restart: unless-stopped

  auth-service:
    build:
      context: ./services/auth
    ports:
      - "3001:3001"
    env_file:
      - ./services/auth/auth.env
    environment:
      NODE_ENV: development
      PORT: 3001
    volumes:
      - ./services/auth:/app
      - /app/node_modules
    networks:
      - app-network
    restart: unless-stopped

  ai-service:
    build:
      context: ./services/ai
    ports:
      - "3002:3002"
    env_file:
      - ./services/ai/ai.env
    environment:
      NODE_ENV: development
      PORT: 3002
    volumes:
      - ./services/ai:/app
      - /app/node_modules
    networks:
      - app-network
    restart: unless-stopped

networks:
  app-network:
    driver: bridge